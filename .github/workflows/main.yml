name: Playwright Automation (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  browser-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 \
            libatspi2.0-0 libwayland-client0

      - name: Install Python dependencies + Playwright browsers
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --upgrade -r requirements.txt
          fi
          pip install --upgrade gitpython playwright requests playwright-stealth
          playwright install --with-deps chromium

      # ----- Start Cloudflare WARP proxy container -----
      - name: Start WARP proxy
        run: |
          docker network create warp-net || true

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize (20 seconds)..."
          sleep 20

          for i in {1..5}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              break
            else
              echo "Attempt $i/5 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      # ----- Set Git identity -----
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # ----- Run the orchestrator (with browser and default WARP proxy) -----
      - name: Run script
        run: python repo_and_browser_tool.py --browser --headless

      # ----- Cleanup: stop WARP container -----
      - name: Stop WARP container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true