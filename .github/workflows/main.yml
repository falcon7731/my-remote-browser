name: Playwright Automation (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  browser-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 \
            libatspi2.0-0 libwayland-client0

      - name: Install Python dependencies + Playwright browsers
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install --upgrade -r requirements.txt
          fi
          pip install --upgrade gitpython playwright requests
          playwright install --with-deps chromium

      - name: Verify workspace and script presence
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          if [ -f repo_and_browser_tool.py ]; then
            echo "✅ Script found."
          else
            echo "❌ Script missing!"
            exit 1
          fi

      - name: Run script (with debug)
        id: run_script
        run: |
          python repo_and_browser_tool.py --browser --headless
        continue-on-error: true   # We'll upload logs even if it fails

      - name: Show log files
        if: always()
        run: |
          echo "=== debug.log ==="
          cat debug.log || echo "No debug.log"
          echo "=== error.log ==="
          cat error.log || echo "No error.log"

      - name: Upload debug logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            debug.log
            error.log
            youtube.png
          if-no-files-found: ignore

      - name: Fail the job if script failed
        if: steps.run_script.outcome == 'failure'
        run: exit 1